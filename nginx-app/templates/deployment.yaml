apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: nginx-app

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: nginx-app

  template:
    metadata:
      labels:
        app: nginx-app

    spec:
      containers:
      - name: nginx-app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: 50m
            memory: 64Mi

          limits:
            cpu: 200m
            memory: 128Mi
